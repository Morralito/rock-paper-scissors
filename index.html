<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors by Morralito</title>
</head>
<body>
  <h1>Welcome to Rock Paper Scissors. Chose your option!</h1>
  <button id="rock">Rock</button>
  <button id="paper">Paper</button>
  <button id="scissors">Scissors</button>   

  <script>
      function computerPlay(){
          const RPS = ["rock", "paper", "scissors"];
          return RPS[Math.floor(Math.random() * (3 - 0) + 0)];
      }

      function roundWinner(playerSelection, computerSelection){
         if(computerSelection === playerSelection){
            return "It's a tie!";
         } 
         else {
            switch(playerSelection){

               case 'rock':
                  if (computerSelection === "paper"){
                     return `You lose! ${computerSelection} beats ${playerSelection} :(`;
                  }
                  else{
                     return `You win! ${playerSelection} beats ${computerSelection} :D`;
                  }

               case 'paper':
                  if (computerSelection === "scissors"){
                     return `You lose! ${computerSelection} beats ${playerSelection} :(`;
                  }
                  else{
                     return `You win! ${playerSelection} beats ${computerSelection} :D`;
                  }

               case 'scissors':
               if (computerSelection === "rock"){
                     return `You lose! ${computerSelection} beats ${playerSelection} :(`
                  }
                  else{
                     return `You win! ${playerSelection} beats ${computerSelection} :D`
                  }
                default: 
                  return "Invalid option, try again.";      
            }
         }
      }
      
      let playerScore = 0;
      let computerScore = 0;
      let resetScore = () => computerScore = playerScore = 0;
      function game(pSelection){
        
         let result = roundWinner(pSelection,computerPlay());
  
         result = result.slice(0,8);
         if ( result === "You win!"){
             playerScore++; 
         }
         else if (result === "You lose"){
             computerScore++;
         }
         if (playerScore === computerScore === 5 ){
           resetScore();
           return "The game ends in a tie";
         }
         else if (playerScore === 5) {
          resetScore();
          return `You win`
         }
         else if (computerScore === 5){
          resetScore();
          return `You lose`; 
         }
      }
      
      
      window.addEventListener('click', function(e){
          let choice = e.path[0].id;
          if (!choice) return;
          console.log(game(choice));
        });
      
  
  </script>
    
</body>
</html>
